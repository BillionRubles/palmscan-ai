<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>PalmScan AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(0,255,200,0.25),
transparent 60%);
filter:blur(40px);
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

h1{
font-size:54px;
margin:0;
letter-spacing:-2px;
}

p{
font-size:20px;
opacity:0.8;
margin-top:12px;
}

.button{
margin-top:30px;
display:inline-block;
padding:18px 34px;
border-radius:16px;
background:#00FFC2;
color:black;
font-weight:bold;
font-size:20px;
text-decoration:none;
box-shadow:0 0 30px rgba(0,255,194,0.5);
}

.scan{
margin:40px auto;
width:220px;
height:220px;
border-radius:50%;
border:2px solid rgba(0,255,200,0.5);
position:relative;
overflow:hidden;
}

.line{
position:absolute;
width:100%;
height:4px;
background:#00FFC2;
top:0;
animation:scan 3s linear infinite;
box-shadow:0 0 20px #00FFC2;
}

@keyframes scan{
0%{top:0;}
100%{top:100%;}
}

.small{
margin-top:20px;
font-size:14px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>PalmScan AI</h1>

<p>Your future generated in seconds</p>

<div class="scan">
<div class="line"></div>
</div>

<a class="button" href="#">
SCAN MY PALM
</a>

<div class="small">
AI destiny experience
</div>

</div>

</body>
</html>
